<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>HolyShit.app — Relief Radar</title>
  <meta name="description" content="Find public toilets and drinking water near you or along your route.">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="shortcut icon" href="favicon.png">
  <meta name="theme-color" content="#faf8f3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="HolyShit">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:       #faf8f3;
      --card:        #eeecea;
      --card-hi:     #e5e2da;
      --border:      #dbd8d0;
      --border-hi:   #c8c4bc;
      --orange:      #e8601a;
      --orange-lt:   rgba(232,96,26,0.10);
      --orange-glow: rgba(232,96,26,0.25);
      --orange-dk:   #c44e10;
      --water:       #1a8fd9;
      --water-lt:    rgba(26,143,217,0.10);
      --text:        #1a1008;
      --text-mid:    #6b6258;
      --text-dim:    #a89e94;
      --radius:      14px;
      --radius-sm:   10px;
      --shadow:      0 4px 20px rgba(100,80,60,0.15);
      --shadow-sm:   0 2px 10px rgba(100,80,60,0.10);
      --font-d:      'Anton', sans-serif;
      --font-b:      'DM Sans', sans-serif;
    }

    html, body {
      height: 100%; width: 100%; overflow: hidden;
      background: var(--cream); color: var(--text);
      font-family: var(--font-b);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    #map { position: fixed; inset: 0; z-index: 0; }
    
    /* Push Google Controls */
    .gm-bundled-control { bottom: 80px !important; }
    .gmnoprint.gm-bundled-control-on-bottom { bottom: 80px !important; }
    .gm-style-mtc-bbw, .gm-style .gm-style-mtc, div[style*="position: absolute"][style*="top"] .gmnoprint { top: calc(env(safe-area-inset-top, 0px) + 140px) !important; }

    /* ── TOP PANEL ── */
    .top-panel {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100; padding: calc(env(safe-area-inset-top, 0px) + 12px) 12px 8px; pointer-events: none;
      transition: transform 0.3s ease;
    }
    .top-panel > * { pointer-events: all; }
    .top-panel.shifted { transform: translateY(38px); } /* Shifts down when route bar is active */

    .header-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }

    .wordmark {
      font-family: var(--font-d); font-size: 22px;
      letter-spacing: 1px; line-height: 1; color: var(--text); white-space: nowrap;
      text-shadow: 0 1px 8px rgba(250,248,243,1), 0 2px 16px rgba(250,248,243,0.9);
      cursor: pointer;
    }
    .wordmark .shit { color: var(--orange); }

    .mode-row { display: flex; gap: 6px; flex: 1; }
    .mode-pill {
      flex: 1; padding: 7px 10px; border-radius: 30px;
      border: 1.5px solid var(--border); background: var(--cream); color: var(--text-mid);
      font-family: var(--font-b); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.18s; text-align: center; white-space: nowrap;
      box-shadow: var(--shadow-sm);
    }
    .mode-pill.active {
      background: var(--orange); color: #fff; border-color: var(--orange);
      box-shadow: 0 2px 14px var(--orange-glow);
    }

    .search-card {
      background: var(--cream); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 10px; box-shadow: var(--shadow);
    }
    .search-row { display: flex; align-items: center; gap: 8px; }

    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .dot-origin { background: var(--orange); box-shadow: 0 0 5px var(--orange-glow); }
    .dot-dest   { background: var(--text); }
    .vline { width:1px; height:14px; background:var(--border); margin:3px 0 3px 4px; flex-shrink:0; }
    .route-spacer { margin-top: 6px; }

    .search-input {
      flex: 1; background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); padding: 9px 12px; color: var(--text);
      font-family: var(--font-b); font-size: 14px; outline: none;
      transition: border-color 0.18s; min-width: 0;
    }
    .search-input:focus { border-color: var(--orange); background: #fff;}
    .search-input::placeholder { color: var(--text-dim); }

    .action-btn {
      padding: 9px 18px; border-radius: var(--radius-sm); border: none;
      background: var(--orange); color: #fff; font-family: var(--font-d);
      font-size: 15px; letter-spacing: 1px; cursor: pointer;
      transition: all 0.18s; white-space: nowrap; flex-shrink: 0;
    }
    .action-btn:hover  { background: var(--orange-dk); }
    .action-btn:active { transform: scale(0.96); }
    
    .tm-row { display: flex; gap: 6px; margin-top: 8px; }
    .action-btn.secondary {
      background: var(--card); color: var(--text);
      border: 1.5px solid var(--border); font-size: 12px; flex: 1; text-align: center;
      padding: 6px 0; font-family: var(--font-b); font-weight: 600; letter-spacing: 0;
    }
    .action-btn.secondary:hover { border-color: var(--orange); color: var(--orange); }
    .action-btn.secondary.sel   { background: var(--orange-lt); border-color: var(--orange); color: var(--orange); }

    .layer-row { display: flex; gap: 6px; margin-top: 7px; }
    .layer-btn {
      display: flex; align-items: center; gap: 5px; padding: 5px 11px;
      border-radius: 20px; border: 1.5px solid var(--border); background: var(--cream);
      color: var(--text-mid); font-family: var(--font-b); font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all 0.18s; box-shadow: var(--shadow-sm);
    }
    .layer-btn.on-toilet { background: var(--orange-lt); border-color: var(--orange); color: var(--orange); }
    .layer-btn.on-water  { background: var(--water-lt);  border-color: var(--water);  color: var(--water); }
    .layer-btn.on-access { background: rgba(100,60,200,0.08); border-color: #7a63ff; color: #6044cc; }

    /* ── ROUTE BAR ── */
    .route-bar {
      position: fixed; top: env(safe-area-inset-top, 0px); left: 0; right: 0; z-index: 99;
      background: var(--cream); border-bottom: 1.5px solid var(--border);
      padding: 10px 16px; display: flex; align-items: center; gap: 12px;
      font-size: 12px; font-weight: 600;
      transform: translateY(-100%); transition: transform 0.3s ease;
      box-shadow: var(--shadow-sm);
    }
    .route-bar.show { transform: translateY(0); }
    .route-stat { color: var(--text-mid); }
    .route-stat strong { color: var(--text); }
    .route-divider { flex: 1; }
    .clear-route-btn {
      background: none; border: 1.5px solid var(--border);
      color: var(--text-mid); font-family: var(--font-b);
      font-size: 11px; font-weight: 600; padding: 3px 10px;
      border-radius: 20px; cursor: pointer; transition: all 0.18s;
    }
    .clear-route-btn:hover { border-color: var(--orange); color: var(--orange); }

    /* ── FAB ── */
    .fab-stack { position: fixed; bottom: 30px; right: 14px; z-index: 100; }
    .fab {
      width: 52px; height: 52px; border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      background: var(--orange); color: #fff; font-size: 18px;
      box-shadow: 0 4px 18px var(--orange-glow), var(--shadow); transition: all 0.18s;
    }
    .fab:hover  { background: var(--orange-dk); }
    .fab:active { transform: scale(0.92); }
    .fab.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── COUNT PILL ── */
    .count-pill {
      position: fixed; bottom: 95px; left: 50%; transform: translateX(-50%);
      z-index: 100; background: var(--cream); border: 1.5px solid var(--border);
      border-radius: 30px; padding: 6px 16px; font-size: 12px; font-weight: 600;
      color: var(--text-mid); white-space: nowrap; box-shadow: var(--shadow);
      transition: opacity 0.3s; pointer-events: none; opacity: 0;
    }
    .count-pill.show { opacity: 1; }
    .count-pill .hi { color: var(--orange); font-weight: 700; }
    .count-pill .wi { color: var(--water);  font-weight: 700; }

    /* ── BOTTOM SHEET ── */
    .backdrop {
      position: fixed; inset: 0; background: rgba(26,16,8,0.40); z-index: 200;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .backdrop.on { opacity: 1; pointer-events: all; }

    .sheet {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;
      background: var(--cream); border-top: 1.5px solid var(--border);
      border-radius: 22px 22px 0 0;
      box-shadow: 0 -8px 40px rgba(100,80,60,0.18);
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
      max-height: 82vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }
    .sheet.on { transform: translateY(0); }
    .sheet-handle { width: 38px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
    .sheet-body { padding: 16px 20px 8px; }

    .type-badge {
      display: inline-flex; align-items: center; gap: 5px; padding: 3px 11px;
      border-radius: 20px; font-family: var(--font-b); font-size: 11px; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px;
    }
    .type-badge.toilet { background: var(--orange-lt); color: var(--orange); border: 1px solid rgba(232,96,26,0.2); }
    .type-badge.water  { background: var(--water-lt);  color: var(--water);  border: 1px solid rgba(26,143,217,0.2); }

    .sheet-name { font-family: var(--font-d); font-size: 28px; line-height: 1.0; margin-bottom: 4px; letter-spacing: 0.5px; }
    .sheet-meta { color: var(--text-mid); font-size: 13px; margin-bottom: 14px; display: flex; flex-wrap: wrap; gap: 6px; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .chip { padding: 4px 11px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--text-mid); font-size: 12px; font-weight: 500; }
    .chip.yes       { border-color: var(--orange); color: var(--orange); background: var(--orange-lt); }
    .chip.water-yes { border-color: var(--water);  color: var(--water);  background: var(--water-lt); }

    .sheet-notes { color: var(--text-mid); font-size: 13px; line-height: 1.5; padding: 10px 12px; background: var(--card); border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 14px; }

    .dir-btn {
      width: 100%; padding: 13px; border-radius: var(--radius-sm); border: none;
      background: var(--orange); color: #fff; font-family: var(--font-d);
      font-size: 16px; letter-spacing: 1px; cursor: pointer;
      transition: all 0.18s; margin-bottom: 12px; text-align: center; display: block;
    }
    .dir-btn:hover { background: var(--orange-dk); }

    /* ── TOAST ── */
    .toast {
      position: fixed; top: calc(env(safe-area-inset-top, 0px) + 160px); left: 50%;
      transform: translateX(-50%) translateY(-8px); z-index: 500;
      background: var(--text); color: var(--cream);
      padding: 9px 18px; border-radius: 30px; font-size: 13px; font-weight: 500;
      pointer-events: none; opacity: 0; transition: all 0.25s;
      max-width: calc(100vw - 40px); text-align: center;
      box-shadow: var(--shadow); white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── AUTOCOMPLETE ── */
    .pac-container { background:var(--cream)!important; border:1.5px solid var(--border)!important; border-radius:var(--radius-sm)!important; box-shadow:var(--shadow)!important; font-family:var(--font-b)!important; }
    .pac-item { color:var(--text)!important; border-top-color:var(--border)!important; padding:9px 12px!important; font-size:13px!important; cursor:pointer; }
    .pac-item:hover { background:var(--card)!important; }
    .pac-item-query { color:var(--text)!important; }
    .pac-matched { color:var(--orange)!important; font-weight:700; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="map"></div>

<div class="route-bar" id="routeBar">
  <span class="route-stat">📍 <strong id="statDist">—</strong></span>
  <span class="route-stat">⏱ <strong id="statTime">—</strong></span>
  <span class="route-stat">🚻 <strong id="statToilets">—</strong></span>
  <span class="route-stat">💧 <strong id="statWater">—</strong></span>
  <div class="route-divider"></div>
  <button class="clear-route-btn" onclick="clearRoute()">✕ Clear</button>
</div>

<div class="top-panel" id="topPanel">
  <div class="header-row">
    <div class="wordmark" onclick="location.reload()">H💩LY<span class="shit">SHIT</span></div>
    <div class="mode-row">
      <button class="mode-pill active" id="pillNearest" onclick="setMode('nearest')">📍 Nearest</button>
      <button class="mode-pill"        id="pillRoute"   onclick="setMode('route')">🏃 Route</button>
    </div>
  </div>

  <div class="search-card" id="cardNearest">
    <div class="search-row">
      <input type="text" id="inputNearest" class="search-input" placeholder="Search a suburb or landmark…" autocomplete="off">
      <button class="action-btn" onclick="searchNearest()">FIND</button>
    </div>
  </div>

  <div class="search-card hidden" id="cardRoute">
    <div class="search-row">
      <span class="dot dot-origin"></span>
      <input type="text" id="inputOrigin" class="search-input" placeholder="Start — tap map or search…" autocomplete="off" onfocus="S.pickingStep='start'; toast('📍 Tap map to set START');">
    </div>
    <div class="vline"></div>
    <div class="search-row route-spacer">
      <span class="dot dot-dest"></span>
      <input type="text" id="inputDest" class="search-input" placeholder="Finish — tap map or search…" autocomplete="off" onfocus="S.pickingStep='end'; toast('🏁 Tap map to set FINISH');">
      <button class="action-btn" onclick="planRoute()">GO</button>
    </div>
    <div class="tm-row">
      <button class="action-btn secondary sel" id="tmWalk"  onclick="setTravelMode('WALKING')">🚶 Walk</button>
      <button class="action-btn secondary"     id="tmBike"  onclick="setTravelMode('BICYCLING')">🚴 Cycle</button>
      <button class="action-btn secondary"     id="tmDrive" onclick="setTravelMode('DRIVING')">🚗 Drive</button>
    </div>
  </div>

  <div class="layer-row">
    <button class="layer-btn on-toilet" id="btnToilet" onclick="toggleLayer('toilet')">🚻 Toilets</button>
    <button class="layer-btn on-water"  id="btnWater"  onclick="toggleLayer('water')">💧 Water</button>
    <button class="layer-btn"           id="btnAccess" onclick="toggleLayer('accessible')">♿ Accessible</button>
  </div>
</div>

<div class="count-pill" id="countPill">
  <span class="hi" id="countT">0</span> toilets &nbsp;·&nbsp;
  <span class="wi" id="countW">0</span> water
</div>

<div class="fab-stack">
  <button class="fab" id="fabLocate" onclick="locateMe()" title="Find my location">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9" opacity=".4"/>
      <line x1="12" y1="2"  x2="12" y2="5"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="2"  y1="12" x2="5"  y2="12"/>
      <line x1="19" y1="12" x2="22" y2="12"/>
    </svg>
  </button>
</div>

<div class="backdrop" id="backdrop" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-body" id="sheetBody"></div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

const UNITS = (function() {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
    const useMiles = tz.startsWith('America/') || tz.startsWith('US/') || ['Europe/London','Europe/Belfast'].includes(tz);
    return {
        distLong: useMiles ? 'MILES' : 'KM', pace: useMiles ? 'MIN/MI' : 'MIN/KM',
        fromKm: km => useMiles ? km * 0.621371 : km,
        fmtDist: (km, d=2) => (useMiles ? km*0.621371 : km).toFixed(d) + (useMiles ? ' mi' : ' km'),
        fmtShort: km => (useMiles ? (km*0.621371).toFixed(1)+' mi' : km.toFixed(1)+' km'),
    };
})();

const S = {
  map:null, geocoder:null, dirService:null, dirRenderer:null,
  userMarker:null, userAccuracy:null, userPos:null, 
  mode:'nearest', travelMode:'WALKING', pickingStep:null,
  planStart:null, planEnd:null,
  layers:{toilet:true, water:true, accessible:false},
  markers:[], allLoos:[], activeRoutePath:null,
  ac:{nearest:null, origin:null, dest:null},
  toastTimer:null,
};

const el = id => document.getElementById(id);

function toast(msg, ms=3200) {
  const t=el('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(S.toastTimer); S.toastTimer=setTimeout(()=>t.classList.remove('show'),ms);
}

function haversine(lat1,lng1,lat2,lng2) {
  const R=6371000, r=Math.PI/180;
  const a=Math.sin(((lat2-lat1)*r)/2)**2+Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(((lng2-lng1)*r)/2)**2;
  return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
const isWaterOnly = (loo) => loo.t?.f && !loo.t?.w && !loo.t?.b && !loo.golden;

// SVG Markers (Bypasses Windows Emoji Corruption)
const pinToilet = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="34" height="42" viewBox="0 0 34 42"><defs><filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-opacity="0.30"/></filter></defs><path d="M17 2C9.3 2 3 8.3 3 16c0 9.8 14 24 14 24S31 25.8 31 16C31 8.3 24.7 2 17 2Z" fill="#e8601a" filter="url(#s)"/><circle cx="17" cy="16" r="10" fill="#3d1600"/><text x="17" y="20.5" font-size="11" text-anchor="middle" font-family="sans-serif">🚻</text></svg>');
const pinWater = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="30" height="36" viewBox="0 0 30 36"><defs><filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.25"/></filter></defs><path d="M15 2C8.4 2 3 7.4 3 14c0 8.4 12 20 12 20S27 22.4 27 14C27 7.4 21.6 2 15 2Z" fill="#1a8fd9" filter="url(#s)"/><circle cx="15" cy="14" r="9" fill="#061830"/><text x="15" y="18.5" font-size="11" text-anchor="middle" font-family="sans-serif">💧</text></svg>');
const pinStar = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="34" height="42" viewBox="0 0 34 42"><defs><filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-opacity="0.30"/></filter></defs><path d="M17 2C9.3 2 3 8.3 3 16c0 9.8 14 24 14 24S31 25.8 31 16C31 8.3 24.7 2 17 2Z" fill="#FFD700" filter="url(#s)"/><circle cx="17" cy="16" r="10" fill="#3d1600"/><text x="17" y="20.5" font-size="11" text-anchor="middle" font-family="sans-serif">⭐</text></svg>');

function initMap() {
  S.map = new google.maps.Map(document.getElementById('map'), {
    center:{lat:-35.28,lng:149.13}, zoom:14, mapTypeId:'roadmap',
    disableDefaultUI:true, gestureHandling:'greedy', clickableIcons:false,
    styles: warmStyle(),
  });
  
  S.geocoder    = new google.maps.Geocoder();
  S.dirService  = new google.maps.DirectionsService();
  S.dirRenderer = new google.maps.DirectionsRenderer({
    suppressMarkers:true,
    polylineOptions:{ strokeColor:'#e8601a', strokeWeight:5, strokeOpacity:0.88 },
  });
  S.dirRenderer.setMap(S.map);

  // Setup Autocomplete
  const acOpts = { fields: ['geometry', 'name'] };
  S.ac.nearest = new google.maps.places.Autocomplete(el('inputNearest'), acOpts);
  S.ac.origin  = new google.maps.places.Autocomplete(el('inputOrigin'), acOpts);
  S.ac.dest    = new google.maps.places.Autocomplete(el('inputDest'), acOpts);

  S.ac.nearest.addListener('place_changed', searchNearest);
  S.ac.origin.addListener('place_changed', () => { S.planStart = S.ac.origin.getPlace().geometry.location; });
  S.ac.dest.addListener('place_changed', () => { S.planEnd = S.ac.dest.getPlace().geometry.location; planRoute(); });

  S.map.addListener('click', handleMapClick);
  S.map.addListener('idle', renderVisibleMarkers);

  loadData();
  locateMe();
}

async function loadData() {
  try {
      const res = await fetch('toilets-au.json');
      S.allLoos = await res.json();
      renderVisibleMarkers();
  } catch(e) { console.error("Data load error"); }
}

function setMode(mode) {
  S.mode = mode; S.pickingStep = null;
  el('pillNearest').classList.toggle('active', mode==='nearest');
  el('pillRoute').classList.toggle('active', mode==='route');
  el('cardNearest').classList.toggle('hidden', mode!=='nearest');
  el('cardRoute').classList.toggle('hidden', mode!=='route');
  if (mode==='nearest') clearRoute();
  else toast('📍 Search or tap the map to set a start point');
}

function setTravelMode(mode) {
  S.travelMode = mode;
  ['tmWalk','tmBike','tmDrive'].forEach(id=>el(id).classList.remove('sel'));
  ({WALKING:'tmWalk',BICYCLING:'tmBike',DRIVING:'tmDrive'})[mode] && el(({WALKING:'tmWalk',BICYCLING:'tmBike',DRIVING:'tmDrive'})[mode]).classList.add('sel');
  if (S.activeRoutePath) planRoute();
}

function locateMe() {
  const fab = el('fabLocate'); fab.classList.add('spinning');
  if (!navigator.geolocation) { toast('Geolocation not supported'); fab.classList.remove('spinning'); return; }
  
  navigator.geolocation.getCurrentPosition(
    pos => {
      fab.classList.remove('spinning');
      const latLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      S.userPos = latLng;
      
      if (!S.userMarker) {
        S.userAccuracy = new google.maps.Circle({ map: S.map, center: latLng, radius: pos.coords.accuracy, fillColor: '#e8601a', fillOpacity: 0.1, strokeColor: '#e8601a', strokeOpacity: 0.3, strokeWeight: 1, clickable: false, zIndex: 1 });
        S.userMarker = new google.maps.Marker({ position: latLng, map: S.map, icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: '#e8601a', fillOpacity: 1, strokeColor: '#FFFFFF', strokeWeight: 3, scale: 8 }, zIndex: 10, clickable: false });
      } else {
        S.userMarker.setPosition(latLng); S.userAccuracy.setCenter(latLng); S.userAccuracy.setRadius(pos.coords.accuracy);
      }
      S.map.panTo(latLng); S.map.setZoom(15);
      renderVisibleMarkers();
    },
    () => { fab.classList.remove('spinning'); toast('Could not get GPS location'); },
    {enableHighAccuracy:true, timeout:10000}
  );
}

function searchNearest() {
  const place = S.ac.nearest.getPlace();
  if (place?.geometry) {
      S.map.panTo(place.geometry.location);
      S.map.setZoom(15);
      renderVisibleMarkers();
  }
}

function handleMapClick(e) {
    if (S.mode === 'route' && S.pickingStep) {
        const latLng = e.latLng;
        S.geocoder.geocode({ location: latLng }, (results, status) => {
            const label = (status === 'OK' && results[0]) ? results[0].formatted_address.split(',')[0] : 'Map Location';
            if (S.pickingStep === 'start') {
                S.planStart = latLng;
                el('inputOrigin').value = label;
                S.pickingStep = 'end';
                toast('🏁 Tap map to set FINISH');
            } else if (S.pickingStep === 'end') {
                S.planEnd = latLng;
                el('inputDest').value = label;
                S.pickingStep = null;
                planRoute();
            }
        });
    } else {
        closeSheet();
    }
}

function planRoute() {
    if (!S.planStart || !S.planEnd) { toast('Please set both start and finish locations'); return; }
    toast('Calculating route...');
    closeSheet();
    
    S.dirService.route({
        origin: S.planStart,
        destination: S.planEnd,
        travelMode: google.maps.TravelMode[S.travelMode]
    }, (result, status) => {
        if (status !== 'OK') { toast('Could not find a route here.'); return; }
        
        S.dirRenderer.setDirections(result);
        const leg = result.routes[0].legs[0];
        S.activeRoutePath = result.routes[0].overview_path;
        
        el('statDist').innerText = leg.distance.text;
        el('statTime').innerText = leg.duration.text;
        
        // Show route bar, shift top panel
        el('routeBar').classList.add('show');
        el('topPanel').classList.add('shifted');
        
        renderVisibleMarkers();
    });
}

function clearRoute() {
    S.dirRenderer.setDirections({routes:[]});
    S.activeRoutePath = null;
    S.planStart = null; S.planEnd = null;
    el('inputOrigin').value = ''; el('inputDest').value = '';
    el('routeBar').classList.remove('show');
    el('topPanel').classList.remove('shifted');
    renderVisibleMarkers();
}

function toggleLayer(layer) {
  S.layers[layer] = !S.layers[layer];
  el('btnToilet').classList.toggle('on-toilet', S.layers.toilet);
  el('btnWater').classList.toggle('on-water', S.layers.water);
  el('btnAccess').classList.toggle('on-access', S.layers.accessible);
  renderVisibleMarkers();
}

function renderVisibleMarkers() {
    const bounds = S.map.getBounds();
    if (!bounds && !S.activeRoutePath) return;

    S.markers.forEach(m => m.setMap(null));
    S.markers = [];
    
    let routePolyline = null;
    if (S.activeRoutePath) routePolyline = new google.maps.Polyline({ path: S.activeRoutePath });

    let tCount = 0, wCount = 0;

    S.allLoos.forEach(loo => {
        // Filter by bounds OR route tolerance
        const latLng = new google.maps.LatLng(loo.lat, loo.lon);
        let show = false;
        
        if (S.activeRoutePath) {
            // Only show pins within ~200m of the active route
            show = google.maps.geometry.poly.isLocationOnEdge(latLng, routePolyline, 0.0018);
        } else {
            show = bounds && bounds.contains(latLng);
        }
        
        if (!show) return;

        const isWater = isWaterOnly(loo);
        const isAccess = loo.t && loo.t.w;

        // Apply toggles
        if (isWater && !S.layers.water) return;
        if (!isWater && !S.layers.toilet) return;
        if (S.layers.accessible && !isAccess && !isWater) return;

        // Limit to 80 pins to prevent lag
        if (S.markers.length > 80) return;

        isWater ? wCount++ : tCount++;

        let iconUrl = pinToilet;
        if (isWater) iconUrl = pinWater;
        if (loo.golden) iconUrl = pinStar;

        const marker = new google.maps.Marker({
            position: latLng,
            map: S.map,
            icon: {
                url: iconUrl,
                scaledSize: new google.maps.Size(isWater? 30 : 34, isWater? 36 : 42),
                anchor: new google.maps.Point(isWater? 15 : 17, isWater? 36 : 42)
            },
            optimized: false
        });

        marker.addListener('click', () => openSheet(loo));
        S.markers.push(marker);
    });

    // Update Counts
    if (S.activeRoutePath) {
        el('statToilets').innerText = tCount;
        el('statWater').innerText = wCount;
    } else {
        el('countT').innerText = tCount;
        el('countW').innerText = wCount;
        if (tCount > 0 || wCount > 0) {
            el('countPill').classList.add('show');
            setTimeout(() => el('countPill').classList.remove('show'), 3000);
        }
    }
}

function openSheet(loo) {
    S.currentLoo = loo;
    const isW = isWaterOnly(loo);
    
    let chipsHtml = '';
    if (!isW) {
        if (loo.t?.w) chipsHtml += '<div class="chip y">♿ Accessible</div>';
        if (loo.t?.b) chipsHtml += '<div class="chip y">🍼 Baby change</div>';
        if (loo.t?.u) chipsHtml += '<div class="chip">🚻 Unisex</div>';
        if (loo.t?.f && !loo.t?.u) chipsHtml += '<div class="chip">🚺 Female</div>';
        if (loo.t?.m && !loo.t?.u) chipsHtml += '<div class="chip">🚹 Male</div>';
        if (loo.t?.o === '24/7') chipsHtml += '<div class="chip">🟢 24/7</div>';
        else if (loo.t?.o) chipsHtml += `<div class="chip">🕐 ${loo.t.o}</div>`;
    } else {
        chipsHtml += '<div class="chip water-yes">💧 Drinking water</div>';
    }

    const typeBadge = isW ? '<div class="type-badge water">💧 Drinking Water</div>' : (loo.golden ? '<div class="type-badge toilet">⭐ Featured Sanctuary</div>' : '<div class="type-badge toilet">🚻 Public Toilet</div>');

    let distHtml = '';
    if (S.userPos) {
        const dist = haversine(S.userPos.lat, S.userPos.lng, loo.lat, loo.lon);
        distHtml = `&nbsp;·&nbsp; ${dist < 1000 ? Math.round(dist) + 'm' : (dist/1000).toFixed(1) + 'km'} away`;
    }

    const gUrl = `https://www.google.com/maps/dir/?api=1&destination=$${loo.lat},${loo.lon}&travelmode=walking`;

    el('sheetBody').innerHTML = `
      ${typeBadge}
      <div class="sheet-name">${loo.n}</div>
      <div class="sheet-meta">${loo.a || 'Location mapped'}${distHtml}</div>
      <div class="chip-row">${chipsHtml}</div>
      ${loo.note ? `<div class="sheet-notes">${loo.note}</div>` : ''}
      <a href="${gUrl}" target="_blank" style="text-decoration:none;"><div class="dir-btn">📍 GET DIRECTIONS</div></a>
    `;
    
    el('backdrop').classList.add('on');
    el('sheet').classList.add('on');
}

function closeSheet() {
    el('backdrop').classList.remove('on');
    el('sheet').classList.remove('on');
    S.currentLoo = null;
}

function warmStyle() {
  return [
    {elementType:'geometry',                  stylers:[{color:'#f5f0e8'}]},
    {elementType:'labels.text.fill',          stylers:[{color:'#6b6258'}]},
    {elementType:'labels.text.stroke',        stylers:[{color:'#faf8f3'}]},
    {featureType:'road',elementType:'geometry',       stylers:[{color:'#ffffff'}]},
    {featureType:'road',elementType:'geometry.stroke',stylers:[{color:'#e0dbd2'}]},
    {featureType:'road',elementType:'labels.text.fill',stylers:[{color:'#8a8070'}]},
    {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#ffe0b0'}]},
    {featureType:'road.highway',elementType:'geometry.stroke',stylers:[{color:'#e8c880'}]},
    {featureType:'water',elementType:'geometry',      stylers:[{color:'#c5dff0'}]},
    {featureType:'water',elementType:'labels.text.fill',stylers:[{color:'#5a8aaa'}]},
    {featureType:'poi',elementType:'geometry',        stylers:[{color:'#ede8e0'}]},
    {featureType:'poi.park',elementType:'geometry',   stylers:[{color:'#d4e8c8'}]},
    {featureType:'poi.park',elementType:'labels.text.fill',stylers:[{color:'#6a9058'}]},
    {featureType:'transit',elementType:'geometry',    stylers:[{visibility:'off'}]},
    {featureType:'administrative.land_parcel',elementType:'labels',stylers:[{visibility:'off'}]},
  ];
}
</script>
